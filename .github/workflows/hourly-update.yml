name: KBO Hourly Data Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
  DB_PORT: 6543
  DB_USER: kbo_app.fxdbpwxryismutubvfwj
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_NAME: postgres
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workspace dependencies
        run: npm install --workspaces --include-workspace-root --no-audit --no-fund

      - name: Install tsx globally
        run: npm install -g tsx

      - name: Install Python dependencies
        run: pip install xgboost scikit-learn numpy psycopg2-binary

      - name: Generate Prisma Client
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Collect KBO Data
        run: tsx apps/worker/src/jobs/run-all-harvest.ts || echo "Harvest failed, continuing..."

      - name: Collect Extended Stats
        run: tsx apps/worker/src/jobs/run-extended-harvest.ts || echo "Extended harvest failed, continuing..."

      - name: Train ML Model + write today's predictions to Supabase
        env:
          PYTHONIOENCODING: utf-8
        run: python analysis/train_model.py || echo "ML training/inference failed, continuing..."

      - name: Trigger Vercel Cron Update
        run: |
          curl -s -m 30 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://web-muramasa404s-projects.vercel.app/api/cron/update \
            || echo "Vercel cron trigger failed"

      - name: Summary
        run: echo "Hourly update completed at $(date -u '+%Y-%m-%d %H:%M UTC')"
